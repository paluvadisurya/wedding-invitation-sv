      </a>
    </section>

    <div class="gopuram-divider" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="xMidYMax slice"><use href="#m-gopuram"/></svg>
    </div>

    <!-- ══════════════════ 2 · COUNTDOWN ══════════════════ -->
    <section class="scene countdown" id="countdown" data-petal-burst>
      <p class="overline" data-reveal data-i18n="countdown.overline"></p>
      <h2 class="scene-title" data-reveal data-i18n="countdown.title"></h2>
      <div class="count-grid" id="count-grid" data-reveal role="timer" aria-live="off">
        <div class="count-cell"><span class="count-num" id="cd-days">0</span><span class="count-label" data-i18n="countdown.days"></span></div>
        <div class="count-cell"><span class="count-num" id="cd-hours">0</span><span class="count-label" data-i18n="countdown.hours"></span></div>
        <div class="count-cell"><span class="count-num" id="cd-mins">0</span><span class="count-label" data-i18n="countdown.minutes"></span></div>
        <div class="count-cell"><span class="count-num" id="cd-secs">0</span><span class="count-label" data-i18n="countdown.seconds"></span></div>
      </div>
      <p class="count-date" id="count-date" data-reveal></p>
      <div class="count-actions" data-reveal>
        <button class="btn btn-gold" id="save-the-date" type="button" data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-calendar"/></svg>
          <span data-i18n="countdown.saveTheDate"></span>
        </button>
        <button class="btn btn-ghost" id="share-invite" type="button" data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-share"/></svg>
          <span data-i18n="countdown.share"></span>
        </button>
      </div>
    </section>

    <!-- ══════════════════ 3 · INVOCATION ══════════════════ -->
    <section class="scene invocation" id="invocation">
      <svg class="invocation-diya" viewBox="0 0 96 96" data-reveal aria-hidden="true"><use href="#m-diya"/></svg>
      <p class="shloka" id="shloka" data-reveal></p>
      <p class="shloka-meaning" id="shloka-meaning" data-reveal></p>
    </section>

    <!-- ══════════════════ 4 · STORY ══════════════════ -->
    <section class="scene story" id="story">
      <svg class="story-feather" viewBox="0 0 120 170" aria-hidden="true" data-parallax="0.3"><use href="#m-feather"/></svg>
      <header class="scene-head">
        <p class="overline" data-reveal data-i18n="story.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="story.title"></h2>
        <svg class="ornament" viewBox="0 0 240 24" data-reveal aria-hidden="true"><use href="#m-ornament"/></svg>
      </header>
      <div class="story-grid">
        <figure class="story-photo" data-reveal>
          <div class="photo-slot photo-tall" data-photo="story" data-parallax="0.25"></div>
        </figure>
        <div class="story-copy">
          <p class="story-intro" id="story-intro" data-reveal></p>
          <ol class="story-timeline" id="story-timeline"></ol>
        </div>
      </div>
    </section>

    <!-- ══════════════════ 5 · EVENTS ══════════════════ -->
    <section class="scene events" id="events">
      <header class="scene-head">
        <p class="overline" data-reveal data-i18n="events.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="events.title"></h2>
        <p class="scene-sub" data-reveal data-i18n="events.sub"></p>
        <div class="side-legend" data-reveal>
          <span class="legend-chip side-bride"><i></i><span id="legend-bride"></span></span>
          <span class="legend-chip side-groom"><i></i><span id="legend-groom"></span></span>
        </div>
      </header>
      <div class="timeline" id="events-list"></div>
    </section>

    <!-- ══════════════════ 6 · TRAVEL ══════════════════ -->
    <section class="scene travel" id="travel">
      <header class="scene-head">
        <p class="overline" data-reveal data-i18n="travel.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="travel.title"></h2>
        <svg class="ornament" viewBox="0 0 240 24" data-reveal aria-hidden="true"><use href="#m-ornament"/></svg>
      </header>
      <div class="travel-grid" id="travel-grid"></div>
    </section>

    <!-- ══════════════════ 7 · GALLERY ══════════════════ -->
    <section class="scene gallery" id="gallery">
      <header class="scene-head">
        <p class="overline" data-reveal data-i18n="gallery.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="gallery.title"></h2>
      </header>
      <div class="gallery-grid" id="gallery-grid"></div>
      <p class="gallery-note" data-reveal data-i18n="gallery.moreSoon"></p>
    </section>

    <!-- ══════════════════ 8 · RSVP ══════════════════ -->
    <section class="scene rsvp" id="rsvp">
      <header class="scene-head">
        <svg class="rsvp-lotus" viewBox="0 0 48 48" data-reveal aria-hidden="true"><use href="#i-lotus"/></svg>
        <p class="overline" data-reveal data-i18n="rsvp.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="rsvp.title"></h2>
        <p class="scene-sub" data-reveal data-i18n="rsvp.sub"></p>
      </header>
      <form class="rsvp-form" id="rsvp-form" data-reveal novalidate>
        <label class="field">
          <span class="field-label" data-i18n="rsvp.name"></span>
          <input type="text" name="name" id="rsvp-name" autocomplete="name" required />
        </label>
        <fieldset class="field field-choice">
          <legend class="field-label" data-i18n="rsvp.attending"></legend>
          <div class="choice-row">
            <label class="choice"><input type="radio" name="attending" value="yes" checked /><span data-i18n="rsvp.yes"></span></label>
            <label class="choice"><input type="radio" name="attending" value="no" /><span data-i18n="rsvp.no"></span></label>
          </div>
        </fieldset>
        <label class="field field-count" id="rsvp-guests-field">
          <span class="field-label" data-i18n="rsvp.guests"></span>
          <div class="stepper">
            <button type="button" class="step-btn" data-step="-1" aria-label="fewer">−</button>
            <input type="number" name="guests" id="rsvp-guests" min="1" max="20" value="2" inputmode="numeric" />
            <button type="button" class="step-btn" data-step="1" aria-label="more">+</button>
          </div>
        </label>
        <label class="field">
          <span class="field-label" data-i18n="rsvp.message"></span>
          <textarea name="message" id="rsvp-message" rows="3"></textarea>
        </label>
        <button class="btn btn-gold btn-wide" id="rsvp-send" type="submit" data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-whatsapp"/></svg>
          <span id="rsvp-send-label"></span>
        </button>
        <p class="rsvp-deadline" id="rsvp-deadline"></p>
        <p class="rsvp-privacy" id="rsvp-privacy"></p>
      </form>
    </section>

    <!-- ══════════════════ 9 · WISHES ══════════════════ -->
    <section class="scene wishes" id="wishes" data-petal-burst>
      <header class="scene-head">
        <p class="overline" data-reveal data-i18n="wishes.overline"></p>
        <h2 class="scene-title" data-reveal data-i18n="wishes.title"></h2>
      </header>
      <blockquote class="blessing" data-reveal>
        <p class="blessing-script" id="blessing-script"></p>
        <p class="blessing-meaning" id="blessing-meaning"></p>
      </blockquote>
      <div class="wish-composer" data-reveal>
        <textarea id="wish-text" rows="3"></textarea>
        <button class="btn btn-ghost" id="wish-send" type="button" data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-whatsapp"/></svg>
          <span id="wish-send-label"></span>
        </button>
      </div>
    </section>

    <!-- ══════════════════ 10 · FINALE / FOOTER ══════════════════ -->
    <footer class="scene finale" id="finale">
      <div class="finale-names" data-reveal>
        <span class="finale-half" id="finale-bride"></span>
        <svg class="finale-spark" viewBox="0 0 48 48" aria-hidden="true"><use href="#i-sparkle"/></svg>
        <span class="finale-half" id="finale-groom"></span>
      </div>
      <p class="finale-line" data-reveal data-i18n="finale.line"></p>
      <p class="finale-hashtag" id="finale-hashtag" data-reveal></p>
      <div class="finale-actions" data-reveal>
        <button class="btn btn-gold" id="footer-share" type="button" data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-whatsapp"/></svg>
          <span data-i18n="finale.shareWhatsapp"></span>
        </button>
        <a class="btn btn-ghost" id="footer-livestream" href="#" target="_blank" rel="noopener" hidden data-magnetic>
          <svg viewBox="0 0 48 48" aria-hidden="true"><use href="#i-video"/></svg>
          <span data-i18n="finale.watchLive"></span>
        </a>
      </div>
      <div class="contacts" id="contacts">
        <p class="contacts-title" data-reveal data-i18n="finale.questions"></p>
        <div class="contacts-grid" id="contacts-grid" data-reveal></div>
      </div>
      <svg class="ornament" viewBox="0 0 240 24" data-reveal aria-hidden="true"><use href="#m-ornament"/></svg>
      <p class="finale-credit" data-reveal data-i18n="finale.credit"></p>
    </footer>

  </main>

  <!-- desktop custom cursor -->
  <div class="cursor" id="cursor" aria-hidden="true"><i class="cursor-dot"></i><i class="cursor-ring"></i></div>

  <!-- calendar picker popover -->
  <div class="cal-pop" id="cal-pop" hidden>
    <button type="button" class="cal-opt" data-cal="google" data-i18n="calendar.google"></button>
    <button type="button" class="cal-opt" data-cal="ics" data-i18n="calendar.ics"></button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <audio id="bg-music" loop preload="none"></audio>

  <noscript>
    <div class="noscript-card">
      <h1>Srivalli &amp; Surya</h1>
      <p>Wedding — Muhurtham on Wednesday, 26 August 2026, 11:00 AM.</p>
      <p>Please enable JavaScript to experience the full invitation.</p>
    </div>
  </noscript>

  <script type="module" src="js/main.js"></script>
</body>
</html>
